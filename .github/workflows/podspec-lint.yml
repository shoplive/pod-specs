name: Podspec Lint

# PR에 추가/수정된 podspec이 있으면 pod spec lint로 실제 검증하고
# 결과를 PR 코멘트로 남긴다. (재실행 시 같은 코멘트를 갱신)
on:
  pull_request:
    paths:
      - 'Specs/**/*.podspec'
      - 'Specs/**/*.podspec.json'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: podspec-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: pod spec lint
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      # lint --sources 에 넘길 spec 소스 (이 repo + 공식 CDN).
      # podspec이 다른 private pod에 의존하는 경우를 대비해 항상 포함한다.
      LINT_SOURCES: 'https://github.com/shoplive/pod-specs.git,https://cdn.cocoapods.org/'
      # s.source 가 가리키는 SDK 저장소(예: shoplive/ios-sdk)가 private이면
      # 그 저장소 read 권한이 있는 PAT을 SDK_REPO_TOKEN 시크릿으로 등록해야 한다.
      # 기본 GITHUB_TOKEN은 이 저장소에만 접근 가능해서, private 저장소의
      # Release asset 다운로드(lint의 핵심 단계)가 404로 실패한다.
      SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: private 저장소 접근 자격 증명 설정
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # pod spec lint --sources 가 이 spec repo를 clone할 때 쓸 자격 증명
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

          # s.source(:http) Release asset 다운로드용 자격 증명.
          # CocoaPods 다운로더는 curl을 --netrc-optional 로 호출하므로 ~/.netrc 를 읽는다.
          TOKEN="${SDK_REPO_TOKEN:-$GITHUB_TOKEN}"
          printf 'machine github.com\n  login x-access-token\n  password %s\n' "$TOKEN" > ~/.netrc
          chmod 600 ~/.netrc

      - name: 변경된 podspec 탐지
        id: detect
        run: |
          files=$(git diff --name-only --diff-filter=AM "origin/${GITHUB_BASE_REF}...HEAD" \
                  | grep -E '^Specs/.+\.podspec(\.json)?$' || true)
          if [ -z "$files" ]; then
            echo "추가/수정된 podspec 없음 (삭제만 있는 yank PR일 수 있음) — lint 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "lint 대상:"
            echo "$files"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<FILES_EOF'
              echo "$files"
              echo 'FILES_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: pod spec lint 실행
        id: lint
        if: steps.detect.outputs.changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.detect.outputs.files }}
        run: |
          overall=pass
          report=lint-report.md
          details_file=$(mktemp)

          {
            echo "## 🧪 Podspec Lint 결과"
            echo
            echo "- CocoaPods \`$(pod --version)\` · $(xcodebuild -version | tr '\n' ' ')"
            echo
            echo "| Podspec | 결과 | 비고 |"
            echo "|---|---|---|"
          } > "$report"

          while IFS= read -r spec; do
            [ -z "$spec" ] && continue

            # base 브랜치에 이미 존재하던 podspec을 고치는 PR이면,
            # 배포된 버전의 수정(불변 원칙 위반) 가능성이 높으므로 경고 표시
            note="신규"
            if git cat-file -e "origin/${GITHUB_BASE_REF}:${spec}" 2>/dev/null; then
              note="⚠️ **기존 배포 podspec 수정** — 불변 원칙(MAINTAINING.md §6-1) 확인 필요"
            fi

            log=$(mktemp)
            echo "::group::pod spec lint ${spec}"
            set +e
            pod spec lint "$spec" --private --verbose --sources="$LINT_SOURCES" >"$log" 2>&1
            rc=$?
            rc2=1
            if [ $rc -ne 0 ]; then
              # 경고 때문에 실패한 것인지 구분하기 위해 --allow-warnings 로 재시도
              pod spec lint "$spec" --private --verbose --allow-warnings --sources="$LINT_SOURCES" >"$log" 2>&1
              rc2=$?
            fi
            set -e
            cat "$log"
            echo "::endgroup::"

            if [ $rc -eq 0 ]; then
              status="✅ PASS"
            elif [ $rc2 -eq 0 ]; then
              status="⚠️ PASS (경고 있음)"
            else
              status="❌ FAIL"
              overall=fail
            fi

            echo "| \`${spec}\` | ${status} | ${note} |" >> "$report"

            {
              echo
              echo "<details><summary><code>${spec}</code> — ${status} (로그 마지막 120줄)</summary>"
              echo
              echo '````text'
              tail -n 120 "$log"
              echo '````'
              echo
              echo "</details>"
            } >> "$details_file"
          done <<< "$CHANGED_FILES"

          {
            cat "$details_file"
            echo
            echo "> lint 통과는 \"소비자가 pod install 했을 때 되는 상태\"의 근사치입니다."
            echo "> 실패 시 MAINTAINING.md의 \"자주 겪는 lint 실패와 원인\" 표를 먼저 확인하세요."
          } >> "$report"

          if [ "$overall" = fail ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: PR에 결과 코멘트
        if: always() && steps.detect.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- podspec-lint-report -->';

            let body;
            try {
              body = fs.readFileSync('lint-report.md', 'utf8');
            } catch (e) {
              body = '## 🧪 Podspec Lint 결과\n\nlint 단계가 리포트를 생성하지 못했습니다. Actions 실행 로그를 확인하세요.';
            }
            // PR 코멘트 본문 최대 65536자 — 여유를 두고 자름
            if (body.length > 60000) {
              body = body.slice(0, 60000) + '\n\n…(길이 제한으로 잘림 — 전체 로그는 Actions 실행 페이지 참고)';
            }
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            body = `${marker}\n${body}\n\n<sub>workflow: podspec-lint · commit ${sha}</sub>`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: lint 실패 시 잡 실패 처리
        if: steps.lint.outputs.failed == 'true'
        run: |
          echo "하나 이상의 podspec lint가 실패했습니다. PR 코멘트의 로그를 확인하세요."
          exit 1
